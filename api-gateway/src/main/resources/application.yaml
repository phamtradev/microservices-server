server:
  port: 8888

app:
  api-prefix: /api

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      httpclient:
        wiretap: true
      httpserver:
        wiretap: true
      server:
        webflux:
          routes:
            - id: identity_service
              uri: http://localhost:8080
              predicates:
                - Path=${app.api-prefix}/identity/**
              filters:
                - RewritePath=${app.api-prefix}/identity/?(?<segment>.*), ${app.api-prefix}/${segment}

            - id: profile_service
              uri: http://localhost:8081
              predicates:
                - Path=${app.api-prefix}/profile/users/**,
#                - ${app.api-prefix}/profile/internal/users/**
              filters:
                - RewritePath=${app.api-prefix}/profile/?(?<segment>.*), ${app.api-prefix}/profile/${segment}

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    gateway:
      access: unrestricted
